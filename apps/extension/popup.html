<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 260px; margin: 0; padding: 14px; font: 13px/1.5 ui-sans-serif, system-ui, -apple-system, sans-serif; color: #18181b; }
      h1 { margin: 0 0 2px; font-size: 16px; font-weight: 650; }
      p.sub { margin: 0 0 12px; color: #71717a; font-size: 12px; }
      label { display: block; font-size: 11px; font-weight: 600; color: #52525b; margin-bottom: 4px; }
      input { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #e4e4e7; border-radius: 8px; font-size: 13px; outline: none; }
      input:focus { border-color: #a1a1aa; }
      button { width: 100%; margin-top: 10px; border: 0; border-radius: 8px; background: #18181b; color: #fff; padding: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
      .status { margin: 8px 0 0; font-size: 12px; color: #16a34a; min-height: 16px; }
      .hint { margin: 10px 0 0; font-size: 11px; color: #a1a1aa; line-height: 1.5; }
    </style>
  </head>
  <body>
    <h1>Dezin Capture</h1>
    <p class="sub">Hover a design, hit ✦ Capture, Analyze, then Import — the reference and brief land in the Dezin app composer.</p>
    <label for="url">Dezin daemon URL</label>
    <input id="url" type="text" placeholder="http://127.0.0.1:7457" />
    <button id="save">Save</button>
    <p class="status" id="status"></p>
    <p class="hint">Desktop or pnpm dev daemon: <b>http://127.0.0.1:7457</b><br />If you override DEZIN_PORT, use that daemon URL.</p>
    <script src="popup.js"></script>
  </body>
</html>
