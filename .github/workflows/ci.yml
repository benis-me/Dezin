name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck every workspace
        run: pnpm typecheck
      - name: Test with coverage and process-leak guard
        env:
          DEZIN_SHARINGAN_HEADLESS: "1"
        run: node scripts/check-process-leaks.mjs -- pnpm test:coverage
      - name: Build and enforce bundle budgets
        run: pnpm build:check
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
